<style>
  html,body{margin:0;height:100%;background:#0e0a16;overflow:hidden}
  #map{position:absolute;inset:0}
  /* tone the basemap toward the site palette + hide UI chrome we don't want */

  .maplibregl-ctrl-attrib{font-size:10px;background:rgba(14,10,22,.6);color:#9b93b5}
  .maplibregl-ctrl-attrib a{color:#b9b0d4}
  .maplibregl-ctrl-logo{display:none}

var map = new maplibregl.Map({
  container:'map',
  interactive:false,
  attributionControl:{compact:true},
  style:{
    version:8,
    sources:{carto:{type:'raster',tileSize:256,
      tiles:['https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png',
             'https://b.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png',
             'https://c.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png',
             'https://d.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'],
      attribution:'&copy; OpenStreetMap &copy; CARTO'}},
    layers:[{id:'carto',type:'raster',source:'carto'}]
  }
});

function line(cs){return {type:'Feature',geometry:{type:'LineString',coordinates:cs}};}
function pt(c){return {type:'Feature',geometry:{type:'Point',coordinates:c}};}

map.on('load', function(){
  var b = COORDS.reduce(function(bb,c){return bb.extend(c);}, new maplibregl.LngLatBounds(COORDS[0],COORDS[0]));
  map.fitBounds(b,{padding:46, duration:0});

  map.addSource('route',{type:'geojson',data:line([COORDS[0]])});
  map.addLayer({id:'route-glow',type:'line',source:'route',
    layout:{'line-cap':'round','line-join':'round'},
    paint:{'line-color':'#e950dc','line-width':11,'line-blur':12,'line-opacity':0.55}});
  map.addLayer({id:'route-core',type:'line',source:'route',
    layout:{'line-cap':'round','line-join':'round'},
    paint:{'line-color':'#fb6cf2','line-width':3.6}});

  map.addSource('dot',{type:'geojson',data:pt(COORDS[0])});
  map.addLayer({id:'dot-glow',type:'circle',source:'dot',
    paint:{'circle-radius':13,'circle-color':'#e950dc','circle-blur':1,'circle-opacity':0.7}});
  map.addLayer({id:'dot-core',type:'circle',source:'dot',
    paint:{'circle-radius':5,'circle-color':'#ffffff','circle-stroke-width':2,'circle-stroke-color':'#fb6cf2'}});

  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(reduce){
    map.getSource('route').setData(line(COORDS));
    map.getSource('dot').setData(pt(COORDS[0]));
    return;
  }

  var N=COORDS.length, DRAW=4800, HOLD=1300, FADE=800, GAP=250, T=DRAW+HOLD+FADE+GAP;
  var start=null;
  function setOpacity(o){
    map.setPaintProperty('route-glow','line-opacity',0.55*o);
    map.setPaintProperty('route-core','line-opacity',o);
    map.setPaintProperty('dot-glow','circle-opacity',0.7*o);
    map.setPaintProperty('dot-core','circle-opacity',o);
  }
  function frame(ts){
    if(start===null) start=ts;
    var e=(ts-start)%T;
    if(e<DRAW){
      var f=e/DRAW, n=Math.max(2,Math.floor(f*(N-1))+1);
      map.getSource('route').setData(line(COORDS.slice(0,n)));
      map.getSource('dot').setData(pt(COORDS[n-1]));
      setOpacity(1);
    } else if(e<DRAW+HOLD){
      map.getSource('route').setData(line(COORDS));
      map.getSource('dot').setData(pt(COORDS[N-1]));
      setOpacity(1);
    } else if(e<DRAW+HOLD+FADE){
      setOpacity(1-(e-DRAW-HOLD)/FADE);
    } else {
      map.getSource('route').setData(line([COORDS[0]]));
      map.getSource('dot').setData(pt(COORDS[0]));
      setOpacity(0);
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
});
</script>
